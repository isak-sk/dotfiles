"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0     = '#fbf1c7'
color_fg1     = '#ebdbb2'
color_fg2     = '#d5c4a1'
color_fg3     = '#bdae93'
color_fg4     = '#a89984'
color_bg0     = '#282828'
color_bg1     = '#3c3836'
color_bg2     = '#504945'
color_bg3     = '#665c54'
color_bg4     = '#7c6f64'
color_red     = '#cc241d'
color_green   = '#98971a'
color_yellow  = '#d79921'
color_blue    = '#458588'
color_purple  = '#b16286'
color_aqua    = '#689d6a'
color_orange  = '#d65d0e'
color_gray    = '#928374'



format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$zig\
$c\
$cpp\
$docker_context\
$line_break\
$character"""

# ──────────────────────────────────────
# First line modules
# ──────────────────────────────────────

[os]
disabled = true
style = "bg:color_orange fg:color_bg0"
format = "[$symbol ]($style)"


[character]
success_symbol = '[\$](fg:color_green)'
error_symbol = '[\$](fg:color_red)'
vimcmd_symbol = "[V](fg:color_purple)"
format = '$symbol '



[os.symbols]
Arch = " "
Debian = " "
Fedora = " "
Linux = " "
NixOS = " "
openSUSE = " "
Pop = " "
SUSE = " "
Ubuntu = " "
Unknown = " "
Void = " "

[username]
show_always = true
style_user = "fg:color_yellow"
style_root = "fg:color_red"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "fg:color_yellow"
format = "[@$hostname • ]($style)"
ssh_symbol = " "

[directory]
style = "fg:color_aqua"
truncation_length = 4
truncate_to_repo = true
format = "[$path]($style) "
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "fg:color_purple"
format = "[\t$symbol$branch ]($style)"

[git_status]
style = "color_red"
format = "[$all_status$ahead_behind]($style) "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕"
up_to_date = ""
conflicted = "🏳"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[git_commit]
tag_symbol = '  '


# ---
# Language modules (only appear when relevant)
# ---


[python]
symbol = " "
style = "color_yellow"
format = '[$symbol$version(\($virtualenv\))]($style) '


[c]
symbol = " "
style = "color_blue"
format = "[$symbol$version]($style) "

[cpp]
symbol = " "
style = "color_blue"
format = "[$symbol$version]($style) "


[ruby]
symbol = " "
style = "color_red"
format = "[$symbol$version]($style) "

[rust]
symbol = "󱘗 "
style = "color_red"
format = "[$symbol$version]($style) "

[scala]
symbol = " "
style = "color_red"
format = "[$symbol$version]($style) "

[zig]
symbol = " "
style = "color_yellow"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "color_aqua"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style = "color_purple"
format = "[$symbol$version]($style) "

[lua]
symbol = " "
style = "color_aqua"
format = "[$symbol$version]($style) "

[nim]
symbol = "󰆥 "
style = "color_yellow"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style = "color_green"
format = "[$symbol$version]($style) "


# Tools

[cmake]
symbol = " "
style = "color_blue"
format = "[$symbol$version]($style) "

[conda]
symbol = " "
style = "color_yellow"
format = "[$symbol$version]($style)"

[docker_context]
symbol = " "
style = "color_blue"
format = "[$symbol$context]($style) "


# Random stuff for later usage maybe

[memory_usage]
symbol = "󰍛 "

[meson]
symbol = "󰔷 "

[package]
symbol = "󰏗 "
